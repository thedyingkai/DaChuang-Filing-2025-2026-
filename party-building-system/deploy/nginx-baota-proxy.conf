# ----- 试题 / 试卷 / 考试（QUIZ）-----
# 前端页面：/search /PaperList /edit /exam /selfExam /papers /choose /statistics /user
# 后端接口（须全部可达）：
#   /keywords/*  /questions/tf|mc|fi/*  /options/*
#   /papers/*    /participation/*
#   /batch/import /batch/export（题库批量导入导出，若启用）
#   GET /column/selectAll（试题编辑页栏目树，edit.vue）
# GET /keywords 勿 301 到 /keywords/（否则部分环境丢头或返回非 API）
