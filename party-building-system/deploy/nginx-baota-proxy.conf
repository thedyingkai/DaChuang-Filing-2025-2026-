# =============================================================================
# 【宝塔 · 反向代理 · 自定义配置】粘贴本文件全文（不要粘贴 nginx-baota-complete.conf）
#
# 错误示例：把含 upstream / server { } 的 complete 文件贴到这里 → nginx 报错
# 正确位置：网站 → 设置 → 反向代理 → 配置文件（或「自定义配置」）
# 操作：删除该站点里原有的 location / 再粘贴；保存前 nginx -t
#
# 完整 server 块（含 upstream）仅用于：网站 → 设置 → 配置文件 整站编辑
# WebSocket：在 nginx 主配置 http{} 内加 map（见 nginx-baota-complete.conf 头部）
# =============================================================================

client_max_body_size 100m;

#PROXY-START/完整反代

# =========================================================================
# 一、前端路由与 API 同路径冲突分流（必须写在对应 ^~ 之前）
#
# 本项目 axios 请求会带 SM4-Key 头；浏览器地址栏刷新不会带。
# 登录/注册仅 POST 走后端，GET 返回 index.html。
#
# 试题模块前端路由（History 模式，刷新须回 index.html）：
#   /search      试题搜索          API: /questions/* /keywords/*
#   /PaperList   试卷列表          API: GET /papers（与页面同路径，靠 SM4-Key 区分）
#   /edit        试题编辑          API: /questions/* /options/* /keywords/* /column/selectAll
#   /exam        考试              API: /papers /questions/* /participation/add
#   /selfExam    在线自测          API: /papers/self-exam /questions/*
#   /papers      参与测试(试卷详情) 与 GET /papers 同路径 → SM4-Key 分流
#   /choose      试卷生成          API: /papers/create /papers/add/*
#   /statistics  成绩统计          API: /participation/paperwithname/*
#   /user        试题用户页(占位)   与 /user/* 人员 API 冲突 → 精确 /user 走 SPA
# =========================================================================

# 登录页：GET 走 SPA，POST 走 Spring
location = /login {
    error_page 418 = @api_login;
    if ($request_method = POST) {
        return 418;
    }
    try_files /index.html =404;
}
location @api_login {
    proxy_pass https://127.0.0.1:8081;
    proxy_ssl_verify off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

location = /register {
    error_page 418 = @api_register;
    if ($request_method = POST) {
        return 418;
    }
    try_files /index.html =404;
}
location @api_register {
    proxy_pass https://127.0.0.1:8081;
    proxy_ssl_verify off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# 试卷列表 API 与页面路由同为 /papers
location = /papers {
    error_page 418 = @api_papers_root;
    if ($http_sm4_key != "") {
        return 418;
    }
    try_files /index.html =404;
}
location @api_papers_root {
    proxy_pass https://127.0.0.1:8081;
    proxy_ssl_verify off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# 试题「用户」占位页 /user；人员管理 API 均为 /user/xxx
location = /user {
    try_files /index.html =404;
}

# 文章阅读页 /article/123（后端为 /article/selectArticleByid/123）
location ~ ^/article/[0-9]+$ {
    try_files /index.html =404;
}

