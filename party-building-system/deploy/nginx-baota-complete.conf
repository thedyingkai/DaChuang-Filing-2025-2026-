    # ----- 试题 / 试卷 / 考试（QUIZ）-----
    # 前端页面：/search /PaperList /edit /exam /selfExam /papers /choose /statistics /user
    # 后端接口（须全部可达）：
    #   /keywords/*  /questions/tf|mc|fi/*  /options/*
    #   /papers/*    /participation/*
    #   /batch/import /batch/export（题库批量导入导出，若启用）
    #   GET /column/selectAll（试题编辑页栏目树，edit.vue）
    location = /keywords {
        proxy_pass https://dangjian_spring/keywords;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
