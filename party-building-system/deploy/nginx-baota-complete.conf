# =============================================================================
# 智慧党建 — 宝塔 / Nginx 完整站点配置（API 反代 + SPA 刷新 + 路径分流）
#
# 用法（二选一，切勿混用）：
#   A) 整段替换：网站 → 设置 → 配置文件（主 server 块，可含下方 upstream）
#   B) 宝塔「反向代理」子配置：只粘贴 nginx-baota-proxy.conf（无 upstream、无 server{}）
#      【禁止】把本文件（含 upstream）贴进 /www/server/panel/vhost/nginx/proxy/.../*.conf
#      否则会报错：\"upstream\" directive is not allowed here
#
# 部署前在宝塔「配置文件」http { } 内加入 WebSocket map（若无）：
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
#
# 后端：Spring Boot HTTPS，默认 https://127.0.0.1:8081
# 前端：npm run build → dist，.env 中 VUE_APP_BASEURL 留空（同源）
# =============================================================================

upstream dangjian_spring {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name dangjian.example.com;          # ← 改成你的域名

    # ssl_certificate     /www/server/panel/vhost/cert/xxx/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/xxx/privkey.pem;

    root /www/wwwroot/dangjian/dist;           # ← 改成 dist 目录
    index index.html;

    client_max_body_size 100m;

    #PROXY-START/完整反代

    # =========================================================================
    # 一、前端路由与 API 同路径冲突分流（必须写在对应 ^~ 之前）
    #
    # 本项目 axios 请求会带 SM4-Key 头；浏览器地址栏刷新不会带。
    # 登录/注册仅 POST 走后端，GET 返回 index.html。
    #
    # 试题模块前端路由（History 模式，刷新须回 index.html）：
    #   /search      试题搜索          API: /questions/* /keywords/*
    #   /PaperList   试卷列表          API: GET /papers（与页面同路径，靠 SM4-Key 区分）
    #   /edit        试题编辑          API: /questions/* /options/* /keywords/* /column/selectAll
    #   /exam        考试              API: /papers /questions/* /participation/add
    #   /selfExam    在线自测          API: /papers/self-exam /questions/*
    #   /papers      参与测试(试卷详情) 与 GET /papers 同路径 → SM4-Key 分流
    #   /choose      试卷生成          API: /papers/create /papers/add/*
    #   /statistics  成绩统计          API: /participation/paperwithname/*
    #   /user        试题用户页(占位)   与 /user/* 人员 API 冲突 → 精确 /user 走 SPA
    # =========================================================================

    # 登录页：GET 走 SPA，POST 走 Spring
    location = /login {
        error_page 418 = @api_login;
        if ($request_method = POST) {
            return 418;
        }
        try_files /index.html =404;
    }
    location @api_login {
        proxy_pass https://dangjian_spring;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location = /register {
        error_page 418 = @api_register;
        if ($request_method = POST) {
            return 418;
        }
        try_files /index.html =404;
    }
    location @api_register {
        proxy_pass https://dangjian_spring;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # 试卷列表 API 与页面路由同为 /papers
    location = /papers {
        error_page 418 = @api_papers_root;
        if ($http_sm4_key != "") {
            return 418;
        }
        try_files /index.html =404;
    }
    location @api_papers_root {
        proxy_pass https://dangjian_spring;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # 试题「用户」占位页 /user；人员管理 API 均为 /user/xxx
    location = /user {
        try_files /index.html =404;
    }

    # 文章阅读页 /article/123（后端为 /article/selectArticleByid/123）
    location ~ ^/article/[0-9]+$ {
        try_files /index.html =404;
    }

    # =========================================================================
    # 二、后端 API 反代（前缀勿加尾斜杠：/papers 可匹配 /papers/create）
    # =========================================================================

    location ^~ /file {
        proxy_pass https://dangjian_spring;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        client_max_body_size 100m;
    }

    location ^~ /api {
        proxy_pass https://dangjian_spring;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_http_version 1.1;
    }

    location ^~ /columns {
