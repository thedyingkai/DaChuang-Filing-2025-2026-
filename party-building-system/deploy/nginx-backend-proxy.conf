# =============================================================================
# 智慧党建 — Nginx 完整站点（含 SPA 刷新 + 试题 API + 路径分流）
#
# 用法：
#   1. proxy_common.conf 放到 /www/server/nginx/conf/（或改 include 路径）
#   2. 修改 server_name、root、证书、upstream 地址
#   3. nginx -t && nginx -s reload
#
# 宝塔用户可优先使用同目录 nginx-baota-complete.conf（内联 proxy，免 include）
# =============================================================================

upstream dangjian_spring {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name dangjian.example.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    root /www/wwwroot/dangjian/dist;
    index index.html;

    client_max_body_size 100m;

    # ----- 路径分流（须在 API ^~ 之前）-----

    location = /login {
        error_page 418 = @api_login;
        if ($request_method = POST) {
            return 418;
        }
        try_files /index.html =404;
    }
    location @api_login {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location = /register {
        error_page 418 = @api_register;
        if ($request_method = POST) {
            return 418;
        }
        try_files /index.html =404;
    }
    location @api_register {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location = /papers {
        error_page 418 = @api_papers_root;
        if ($http_sm4_key != "") {
            return 418;
        }
        try_files /index.html =404;
    }
    location @api_papers_root {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location = /user {
        try_files /index.html =404;
    }

    location ~ ^/article/[0-9]+$ {
        try_files /index.html =404;
    }

    # ----- API 反代 -----

    location ^~ /file {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
        client_max_body_size 100m;
    }

    location ^~ /api {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ^~ /columns {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /column {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /article {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /homePic {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location ^~ /draft {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /submit {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /audit {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /processtype {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /process {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /comment {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location ^~ /activity {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /resource {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location ^~ /users {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /user/ {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location ^~ /sector {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /department {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /branch_manager {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /branch {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /group {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    # 试题 / 试卷 / 考试（QUIZ）
    location = /keywords {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring/keywords;
    }
    location ^~ /keywords/ {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /questions {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /options {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /papers/ {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /participation {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }
    location ^~ /batch {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
        client_max_body_size 100m;
    }
    location ^~ /role {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location ^~ /chatBot {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
        proxy_read_timeout 600s;
    }

    location ^~ /token {
        include /www/server/nginx/conf/proxy_common.conf;
        proxy_pass https://dangjian_spring;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
